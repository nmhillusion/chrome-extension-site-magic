<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Site Magic</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"><link rel="stylesheet" href="popup.scss"></head><body><div class="container"><header><h1>Site Magic</h1><p>Personalize your browsing experience</p></header><section class="rules-section"><div class="rules-header"><span class="rules-title">Style Rules</span><button class="add-rule-btn" id="add-rule-btn">+ New Rule</button></div><div class="rules-list" id="rules-list"><!-- Rules will be injected here--></div></section><section class="picker-section"><div class="picker-header"><span class="picker-title">Selected Element</span><span class="picking-status" id="picking-status"></span><button class="clear-target-btn" id="clear-target-btn">Clear Target</button></div><div class="selector-container"><textarea class="target-input" id="target-input" placeholder="Global (All Elements)" rows="3"></textarea><button class="copy-btn" id="copy-selector-btn" title="Copy Selector">📋</button></div><button class="picker-btn" id="picker-btn"><span>✨</span> Pick Element to Style</button></section><section class="controls"><div class="control-group" id="group-font-family"><div class="control-header"><label for="font-family">Font Family</label><label class="toggle-switch"><input id="enable-font-family" type="checkbox" checked><span class="slider"></span></label></div><div class="control-content"><select id="font-family"><option value="inherit">Default</option><option value="'Inter', sans-serif">Inter</option><option value="'Roboto', sans-serif">Roboto</option><option value="'Georgia', serif">Georgia</option><option value="'Courier New', monospace">Courier New</option><option value="'Open Sans', sans-serif">Open Sans</option><option value="'Montserrat', sans-serif">Montserrat</option><option value="'Raleway', sans-serif">Raleway</option><option value="'Nunito', sans-serif">Nunito</option><option value="'Cascadia Mono', monospace">Cascadia Mono</option><option value="'Playfair Display', serif">Playfair Display</option></select></div></div><div class="control-group" id="group-font-size"><div class="control-header"><label for="font-size">Font Size (px)</label><label class="toggle-switch"><input id="enable-font-size" type="checkbox" checked><span class="slider"></span></label></div><div class="control-content"><div class="slider-container"><input id="font-size" type="range" min="12" max="32" value="16"><span id="font-size-val">16px</span></div></div></div><div class="control-group" id="group-text-color"><div class="control-header"><label for="text-color">Text Color</label><label class="toggle-switch"><input id="enable-text-color" type="checkbox" checked><span class="slider"></span></label></div><div class="control-content"><div class="color-picker-container"><input id="text-color" type="color" value="#333333"><span id="text-color-val">#333333</span></div></div></div></section><footer><div class="button-row"><button class="secondary-btn" id="reset-btn">Reset</button><button class="primary-btn" id="apply-btn">Save Changes</button></div></footer></div><script type="module" src="popup.ts"></script></body></html>
